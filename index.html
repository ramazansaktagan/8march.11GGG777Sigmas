<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Приглашение на 8 марта</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d88;
}

h4{
    color:#ff4d88;
}

button{
    padding:10px 20px;
    border:none;
    background:#ff4d88;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    margin-top: 10px;
}

button:hover {
    background: #e63973;
}

/* Стили для ссылки на песню */
a.song-link {
    color: #ff4d88;
    font-weight: bold;
    text-decoration: none;
}

a.song-link:hover {
    text-decoration: underline;
}

#msg {
    margin-top: 20px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="card">
<h1>🌸 С 8 Марта! 🌸</h1>
<h4>"Который еще не наступил"</h4>
<p>Құрметті 11Г қыздаритостар!</p>
<p>Сіздерды Халыкаралык Кыздар Күніне шакырамыз!</p>

<p><b>Дата:</b> 6 марта, время: 9:30<br>
<b>Место:</b> #220 кабинет</p>

<button onclick="showMessage()">Нажми меня</button>

<p id="msg"></p>
</div>

<script>
function showMessage(){
    document.getElementById("msg").innerHTML =
    "Будем очень рады вас видет 💐 <br> Мы вас сильно любим! <br><br> 🎶 Послушайте эту песню: <br> <a class='song-link' href='https://youtu.be/bdGOGqkN6Po' target='_blank'>Jazzdauren - Дарите женщинам цветы</a>";
}
</script>
  
</body>

</html>
