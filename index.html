<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Приглашение на 8 марта</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#ff9a9e,#fad0c4);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        margin:0;
        cursor: pointer; /* Подсказка, что нужно кликнуть */
    }
    .card{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }
    h1, h4 { color:#ff4d88; }
    button{
        padding:12px 25px;
        border:none;
        background:#ff4d88;
        color:white;
        border-radius:10px;
        cursor:pointer;
        font-size:18px;
        margin-top: 15px;
        transition: 0.3s;
    }
    button:hover { transform: scale(1.1); background: #e63973; }
    #msg { margin-top: 20px; font-weight: bold; color: #444; }
</style>
</head>

<body onclick="startMusic()">

<div class="card">
    <h1>🌸 С 8 Марта! 🌸</h1>
    <h4>"Который еще не наступил"</h4>
    <p>Құрметті 11Г қыздаритостар!</p>
    <p>Сіздерды Халыкаралык Кыздар Күніне шакырамыз!</p>
    <p><b>Дата:</b> 6 марта, время: 9:30<br>
    <b>Место:</b> #220 кабинет</p>

    <button onclick="showMessage()">Нажми меня</button>
    <p id="msg"></p>
</div>

<audio id="bg-music" src="Андрей Губин - Девушки как звезды.mp3" loop></audio>

<script>
    let musicStarted = false;
    let audio = document.getElementById("bg-music");

    // Функция для запуска музыки при любом клике по экрану
    function startMusic() {
        if (!musicStarted) {
            audio.play().catch(e => console.log("Браузер пока блокирует звук"));
            musicStarted = true;
        }
    }

    // Функция для показа текста
    function showMessage(){
        startMusic(); // На случай если кликнули сразу по кнопке
        document.getElementById("msg").innerHTML = 
        "Будем очень рады вас видеть 💐 <br> Мы вас сильно любим!";
    }
</script>

</body>
</html>
